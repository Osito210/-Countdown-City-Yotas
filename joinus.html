<section class="join-container">
    <h2>Join the CCY Family</h2>
    <!-- The action URL below sends the data to Formspree, which forwards it to your Gmail -->
    <form action="https://formspree.io" method="POST" class="join-form">
        
        <!-- Personal Info -->
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" name="Full Name" placeholder="First & Last Name" required>

        <!-- Contact Info -->
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="Phone Number" placeholder="210-555-5555" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="Sender Email" placeholder="yourname@email.com" required>

        <!-- Vehicle Info -->
        <label for="vehicle">Vehicle Year, Make, & Model</label>
        <input type="text" id="vehicle" name="Vehicle Info" placeholder="e.g., 2022 Toyota Tundra" required>

        <!-- Culture Agreement -->
        <div class="checkbox-group">
            <input type="checkbox" id="culture-check" name="Agreed to Culture" required>
            <label for="culture-check">
                I agree to respect the CCY culture, values, and the "Texas Built" heritage of our community.
            </label>
        </div>

        <button type="submit" class="cta submit-btn">Submit Application</button>
    </form>
</section>
