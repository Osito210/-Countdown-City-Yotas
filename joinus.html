<section class="join-container">
    <h2>Join the CCY Family</h2>
    <p>Become part of San Antonio's premier Toyota community.</p>
    
	<form action="mailto:ewokg210@gmail.com" method="POST" enctype="text/plain" class="join-form">
        <!-- Personal Info -->
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" name="full-name" placeholder="First & Last Name" required>

        <!-- Contact Info -->
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="210-555-5555" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="yourname@email.com" required>

        <!-- Vehicle Info -->
        <label for="vehicle">Vehicle Year, Make, Model of Toyota</label>
        <input type="text" id="vehicle" name="vehicle" placeholder="e.g., 2022 Toyota Tundra" required>

        <!-- Culture Agreement -->
        <div class="checkbox-group">
            <input type="checkbox" id="culture-check" name="culture-check" required>
            <label for="culture-check">
                I agree to respect the CCY culture, values, and the "Texas Built" heritage of our community.
            </label>
        </div>
        <button type="submit" class="cta submit-btn">Submit via Email</button>
	</form>
</section>
