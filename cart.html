<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>

    <!-- Luckiest Guy Font -->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Luckiest Guy", cursive;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .page-container {
            padding: 0 10%;
        }

        #cart-items p {
            font-size: 22px;
            margin: 12px 0;
        }

        #cart-total {
            font-size: 32px;
            margin-top: 20px;
        }

        button {
            font-family: "Luckiest Guy", cursive;
            cursor: pointer;
            background: none;
            border: 2px solid black;
            padding: 5px 15px;
            border-radius: 10px;
            margin-left: 10px;
        }

        button:hover {
            background: black;
            color: white;
        }

        .simple-nav-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: teal;
            color: white;
            border-radius: 14px;
            font-family: "Luckiest Guy", cursive;
            text-decoration: none;
        }

        .simple-nav-btn:hover {
            text-decoration: underline;
        }

        .action-buttons {
            margin-top: 30px;
        }

        .empty-message {
            font-size: 26px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="page-container">
        <h1>Your Cart</h1>

        <div id="cart-items"></div>

        <h2 id="cart-total"></h2>

        <div class="action-buttons">
            <button onclick="clearCart()">Clear Cart</button>
            <button onclick="checkout()">Checkout</button>
        </div>

        <br><br>

        <a href="Merchandise.html" class="simple-nav-btn">Back to Merchandise</a>
        <br><br>
        <a href="index.html" class="simple-nav-btn">Back to Home</a>
    </div>

<script>
    function handleIncomingItem() {
        const urlParams = new URLSearchParams(window.location.search);
        const itemName = urlParams.get('item');
        const itemPrice = parseFloat(urlParams.get('price'));
        const itemSize = urlParams.get('size');     // Capture Size
        const itemQty = parseInt(urlParams.get('qty')) || 1; // Capture Qty (default to 1)

        if (itemName && itemPrice) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            
            const newItem = {
                name: itemName.replace(/-/g, ' '),
                price: itemPrice,
                size: itemSize,
                qty: itemQty
            };

            cart.push(newItem);
            localStorage.setItem("cart", JSON.stringify(cart));
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }
function loadCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let container = document.getElementById("cart-items");
        let total = 0;
        container.innerHTML = "";

        if (cart.length === 0) {
            container.innerHTML = `<p class="empty-message">Your cart is empty.</p>`;
            document.getElementById("cart-total").textContent = "";
            return;
        }

      
        document.getElementById("cart-total").textContent = "Total Order: $" + total;
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
    }
cart.forEach((item, index) => {
        const subtotal = item.price * item.qty;
        total += subtotal;

        // Check if the item is a type that needs a size (Shirts/Hoodies)
        const needsSize = item.name.toLowerCase().includes("shirt") || item.name.toLowerCase().includes("hoodie");

        container.innerHTML += `
            <div style="border-bottom: 1px solid #eee; padding: 15px 0;">
                <p>
                    <strong>${item.name}</strong> <br>
                    
                    ${needsSize ? `
                        <label>Size:</label>
                        <select onchange="updateSize(${index}, this.value)" style="font-family: 'Luckiest Guy'; padding: 5px; border-radius: 8px;">
                            <option value="Small" ${item.size === 'Small' ? 'selected' : ''}>Small</option>
                            <option value="Medium" ${item.size === 'Medium' ? 'selected' : ''}>Medium</option>
                            <option value="Large" ${item.size === 'Large' ? 'selected' : ''}>Large</option>
                            <option value="XL" ${item.size === 'XL' ? 'selected' : ''}>XL</option>
                            <option value="2XL" ${item.size === '2XL' ? 'selected' : ''}>2XL</option>
                        </select>
                    ` : ''}

                    <br>
                    $${item.price} x ${item.qty} = <strong>$${subtotal}</strong>
                    <button onclick="removeItem(${index})">Remove</button>
                </p>
            </div>
        `;
    });

    function updateSize(index, newSize) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart[index].size = newSize;
    
    // Logic to update price based on size choice
    const is2XL = newSize === "2XL";
    if (cart[index].name.toLowerCase().includes("shirt")) {
        cart[index].price = is2XL ? 25 : 20;
    } else if (cart[index].name.toLowerCase().includes("hoodie")) {
        cart[index].price = is2XL ? 50 : 40;
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart(); // Refresh the display and the total
}
    function clearCart() {
        localStorage.removeItem("cart");
        loadCart();
    }

    function checkout() {
        alert("Checkout is not implemented yet!");
    }

    handleIncomingItem(); 
    loadCart();
</script>
    
</body>
</html>
