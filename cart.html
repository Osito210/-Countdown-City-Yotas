<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Countdown City Yotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
    <style>
        body {
            font-family: 'Luckiest Guy', cursive;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Standardized Nav Bar to match other pages */
        .navbar {
            background-color: #008080;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
        }

        .navbar a {
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .navbar a:hover {
            background-color: #005f5f;
            border-radius: 8px;
            transform: scale(1.05);
        }

        .cart-container {
            max-width: 800px;
            margin: 50px auto;
            background: #008080;
            color: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 128, 128, 0.4);
        }

        .item-row {
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding: 25px 0;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="number"], select {
            font-family: 'Luckiest Guy';
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #ffffff;
            background: #005f5f;
            color: white;
            margin-top: 8px;
        }

        .remove-btn {
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Luckiest Guy';
        }

        #cart-total {
            margin-top: 35px;
            font-size: 2.5em;
            color: #ffffff;
        }

        .payment-methods {
            margin-top: 35px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .manual-pay-info {
            display: none;
            background: #ffffff;
            color: #008080;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        /* Footer styling to match standard layout */
        footer {
            background-color: #333;
            color: white;
            padding: 30px 0;
            margin-top: 60px;
        }

        .footer-link {
            color: #ff4500;
            text-decoration: none;
            margin: 0 10px;
        }
    </style>
</head>
<body>

  <div class="navbar">  
    <nav>
        <a href="index.html" title="Go to Home Page">
            <img src="images/logo.png" alt="Countdown City Yotas" />
        </a>
        <ul>
            <li><a href="aboutus.html" title="See About Us Page">About Us</a></li>
            <li><a href="events.html" title="See Events Page">Events</a></li>
            <li><a href="Merchandise.html" title="See Merchandise Page">Merchandise</a></li>
            <li><a href="contactus.html" title="See Contact Us Page">Contact Us</a></li>
            <li><a href="cart.html" title="See Cart Page">Cart</a></li>
        </ul>
        <a href="joinus.html" title="See Join Us Page" class="cta">Join Us</a>
    </nav>
</div>
    
    <div class="cart-container">
        <h1>Your Shopping Cart</h1>
        <div id="cart-items"></div>
        <h2 id="cart-total"></h2>

        <div class="payment-methods">
            <h3>Choose Payment Method:</h3>
            <select id="pay-selector" onchange="togglePaymentFields()" style="width: 85%; font-size: 1.2em;">
                <option value="paypal">PayPal or Credit Card</option>
                <option value="cashapp">CashApp</option>
                <option value="zelle">Zelle</option>
            </select>

            <div id="paypal-button-container" style="margin-top: 30px;"></div>

            <div id="cashapp-info" class="manual-pay-info">
                <p>Send Total to: <strong style="color:#00d632; font-size: 1.4em;">$CCYotas210</strong></p>
                <button class="remove-btn" onclick="confirmManualPay('CashApp')">I Have Sent Payment</button>
            </div>

            <div id="zelle-info" class="manual-pay-info">
                <p>Send Total to: <strong style="color:#008080; font-size: 1.4em;">(210) 555-5555</strong></p>
                <button class="remove-btn" onclick="confirmManualPay('Zelle')">I Have Sent Payment</button>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <a href="Merchandise.html" style="color: white; text-decoration: underline; margin-right: 20px;">Keep Shopping</a>
            <button onclick="clearCart()" class="remove-btn" style="background:#333;">Clear Everything</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Countdown City Yotas. Texas Built.</p>
        <p>
            <a href="index.html" class="footer-link">Home</a> | 
            <a href="Contact_Us.html" class="footer-link">Contact</a>
        </p>
    </footer>

    <script>
        // Logic for incoming items, pricing tiers, and payments remains the same
        function handleIncomingItem() {
            const urlParams = new URLSearchParams(window.location.search);
            const itemName = urlParams.get('item');
            const itemSize = urlParams.get('size');
            const itemQty = parseInt(urlParams.get('qty')) || 1;
            let itemPrice = parseFloat(urlParams.get('price'));

            if (itemName && itemPrice) {
                const nameLower = itemName.toLowerCase();
                const isLargeSize = (itemSize === "2XL" || itemSize === "3XL");

                if (nameLower.includes("shirt")) {
                    itemPrice = isLargeSize ? 25 : 20;
                } else if (nameLower.includes("hoodie")) {
                    itemPrice = isLargeSize ? 50 : 40;
                }

                let cart = JSON.parse(localStorage.getItem("cart")) || [];
                cart.push({ 
                    name: itemName.replace(/-/g, ' '), 
                    price: itemPrice, 
                    size: itemSize, 
                    qty: itemQty 
                });
                localStorage.setItem("cart", JSON.stringify(cart));
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let container = document.getElementById("cart-items");
            let total = 0;
            container.innerHTML = "";

            if (cart.length === 0) {
                container.innerHTML = `<p style="font-size:1.4em; padding: 20px;">Your cart is currently empty.</p>`;
                document.getElementById("cart-total").textContent = "";
                document.querySelector(".payment-methods").style.display = "none";
                return;
            }

            document.querySelector(".payment-methods").style.display = "block";

            cart.forEach((item, index) => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                const needsSize = item.name.toLowerCase().includes("shirt") || item.name.toLowerCase().includes("hoodie");

                container.innerHTML += `
                    <div class="item-row">
                        <div>
                            <strong style="font-size:1.3em;">${item.name}</strong><br>
                            ${needsSize ? `
                                <span>Size: </span>
                                <select onchange="updateSize(${index}, this.value)">
                                    <option value="Small" ${item.size === 'Small' ? 'selected' : ''}>S</option>
                                    <option value="Medium" ${item.size === 'Medium' ? 'selected' : ''}>M</option>
                                    <option value="Large" ${item.size === 'Large' ? 'selected' : ''}>L</option>
                                    <option value="XL" ${item.size === 'XL' ? 'selected' : ''}>XL</option>
                                    <option value="2XL" ${item.size === '2XL' ? 'selected' : ''}>2XL</option>
                                    <option value="3XL" ${item.size === '3XL' ? 'selected' : ''}>3XL</option>
                                </select>
                            ` : ''}
                            <br>
                            <span>Qty: </span>
                            <input type="number" min="1" value="${item.qty}" onchange="updateQty(${index}, this.value)" style="width: 55px;">
                        </div>
                        <div style="text-align: right;">
                            <span style="font-size: 1.2em;">$${subtotal.toFixed(2)}</span><br>
                            <button class="remove-btn" onclick="removeItem(${index})" style="margin-top:12px; font-size:0.8em;">Remove</button>
                        </div>
                    </div>
                `;
            });

            const finalTotal = total.toFixed(2);
            document.getElementById("cart-total").textContent = "Total: $" + finalTotal;
            renderPayPalButton(finalTotal);
            togglePaymentFields();
        }

        function updateSize(index, newSize) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart[index].size = newSize;
            const itemName = cart[index].name.toLowerCase();
            const isLargeSize = (newSize === "2XL" || newSize === "3XL");

            if (itemName.includes("shirt")) {
                cart[index].price = isLargeSize ? 25 : 20;
            } else if (itemName.includes("hoodie")) {
                cart[index].price = isLargeSize ? 50 : 40;
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function updateQty(index, newQty) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart[index].qty = parseInt(newQty) || 1;
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function togglePaymentFields() {
            const method = document.getElementById("pay-selector").value;
            document.getElementById("paypal-button-container").style.display = (method === "paypal") ? "block" : "none";
            document.getElementById("cashapp-info").style.display = (method === "cashapp") ? "block" : "none";
            document.getElementById("zelle-info").style.display = (method === "zelle") ? "block" : "none";
        }

        function renderPayPalButton(totalAmount) {
            document.getElementById("paypal-button-container").innerHTML = "";
            paypal.Buttons({
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: totalAmount } }] }),
                onApprove: (data, actions) => actions.order.capture().then(details => {
                    alert('Order successful!');
                    clearCart();
                })
            }).render('#paypal-button-container');
        }

        function confirmManualPay(method) {
            alert("Thanks! We'll verify your " + method + " transfer and get your order ready!");
            clearCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function clearCart() {
            if(confirm("Clear your cart?")) {
                localStorage.removeItem("cart");
                loadCart();
            }
        }

        handleIncomingItem();
        loadCart();
    </script>
</body>
</html>
