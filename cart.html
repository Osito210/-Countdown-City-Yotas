<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Countdown City Yotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
    <style>
        body {
            font-family: 'Luckiest Guy', cursive;
            background-color: #ffffff; /* White Background */
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .navbar {
            background-color: #008080; /* Teal Navbar */
            overflow: hidden;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }
        .navbar a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        .navbar a:hover {
            background-color: #005f5f;
            border-radius: 8px;
        }

        .cart-container {
            max-width: 800px;
            margin: 50px auto;
            background: #008080; /* Teal Box */
            color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 128, 128, 0.3);
        }

        .item-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 0;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="number"], select {
            font-family: 'Luckiest Guy';
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #ffffff;
            background: #005f5f;
            color: white;
            margin-top: 5px;
        }

        .remove-btn {
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Luckiest Guy';
        }

        .remove-btn:hover {
            background-color: #e63e00;
        }

        #cart-total {
            margin-top: 30px;
            font-size: 2em;
            color: #ffffff;
        }

        .payment-methods {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .manual-pay-info {
            display: none;
            background: #ffffff;
            color: #008080;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 20px 0;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="Events.html">Events</a>
        <a href="Photos.html">Photos</a>
        <a href="Merchandise.html">Merchandise</a>
        <a href="Contact_Us.html">Contact Us</a>
    </div>

    <div class="cart-container">
        <h1>Your Cart</h1>
        <div id="cart-items"></div>
        <h2 id="cart-total"></h2>

        <div class="payment-methods">
            <h3>Select Payment Method:</h3>
            <select id="pay-selector" onchange="togglePaymentFields()" style="width: 80%; font-size: 1.1em;">
                <option value="paypal">PayPal or Credit Card</option>
                <option value="cashapp">CashApp</option>
                <option value="zelle">Zelle</option>
            </select>

            <div id="paypal-button-container" style="margin-top: 25px;"></div>

            <div id="cashapp-info" class="manual-pay-info">
                <p>Send total to: <strong style="color:#00d632;">$CCYotas210</strong></p>
                <button class="remove-btn" onclick="confirmManualPay('CashApp')">I've Sent Payment</button>
            </div>

            <div id="zelle-info" class="manual-pay-info">
                <p>Send total to: <strong style="color:#008080;">(210) 555-5555</strong></p>
                <button class="remove-btn" onclick="confirmManualPay('Zelle')">I've Sent Payment</button>
            </div>
        </div>

        <button onclick="clearCart()" class="remove-btn" style="background:#333; margin-top:40px;">Clear Entire Cart</button>
    </div>

    <footer>
        <p>&copy; 2026 Countdown City Yotas. Texas Built.</p>
    </footer>

    <script>
        function handleIncomingItem() {
            const urlParams = new URLSearchParams(window.location.search);
            const itemName = urlParams.get('item');
            const itemPrice = parseFloat(urlParams.get('price'));
            const itemSize = urlParams.get('size');
            const itemQty = parseInt(urlParams.get('qty')) || 1;

            if (itemName && itemPrice) {
                let cart = JSON.parse(localStorage.getItem("cart")) || [];
                cart.push({ name: itemName.replace(/-/g, ' '), price: itemPrice, size: itemSize, qty: itemQty });
                localStorage.setItem("cart", JSON.stringify(cart));
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let container = document.getElementById("cart-items");
            let total = 0;
            container.innerHTML = "";

            if (cart.length === 0) {
                container.innerHTML = `<p style="font-size:1.2em;">Your cart is empty.</p>`;
                document.getElementById("cart-total").textContent = "";
                document.querySelector(".payment-methods").style.display = "none";
                return;
            }

            document.querySelector(".payment-methods").style.display = "block";

            cart.forEach((item, index) => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                const needsSize = item.name.toLowerCase().includes("shirt") || item.name.toLowerCase().includes("hoodie");

                container.innerHTML += `
                    <div class="item-row">
                        <div>
                            <strong style="font-size:1.2em;">${item.name}</strong><br>
                            ${needsSize ? `
                                <span>Size: </span>
                                <select onchange="updateSize(${index}, this.value)">
                                    <option value="Small" ${item.size === 'Small' ? 'selected' : ''}>S</option>
                                    <option value="Medium" ${item.size === 'Medium' ? 'selected' : ''}>M</option>
                                    <option value="Large" ${item.size === 'Large' ? 'selected' : ''}>L</option>
                                    <option value="XL" ${item.size === 'XL' ? 'selected' : ''}>XL</option>
                                    <option value="2XL" ${item.size === '2XL' ? 'selected' : ''}>2XL</option>
                                </select>
                            ` : ''}
                            <br>
                            <span>Qty: </span>
                            <input type="number" min="1" value="${item.qty}" onchange="updateQty(${index}, this.value)" style="width: 50px;">
                        </div>
                        <div style="text-align: right;">
                            <span>$${subtotal.toFixed(2)}</span><br>
                            <button class="remove-btn" onclick="removeItem(${index})" style="margin-top:10px; font-size:0.8em;">Remove</button>
                        </div>
                    </div>
                `;
            });

            const finalTotal = total.toFixed(2);
            document.getElementById("cart-total").textContent = "Total: $" + finalTotal;
            renderPayPalButton(finalTotal);
            togglePaymentFields();
        }

        function updateSize(index, newSize) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart[index].size = newSize;
            
            // Apply pricing logic for 2XL
            const is2XL = newSize === "2XL";
            if (cart[index].name.toLowerCase().includes("shirt")) {
                cart[index].price = is2XL ? 25 : 20;
            } else if (cart[index].name.toLowerCase().includes("hoodie")) {
                cart[index].price = is2XL ? 50 : 40;
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function updateQty(index, newQty) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart[index].qty = parseInt(newQty) || 1;
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function togglePaymentFields() {
            const method = document.getElementById("pay-selector").value;
            document.getElementById("paypal-button-container").style.display = (method === "paypal") ? "block" : "none";
            document.getElementById("cashapp-info").style.display = (method === "cashapp") ? "block" : "none";
            document.getElementById("zelle-info").style.display = (method === "zelle") ? "block" : "none";
        }

        function renderPayPalButton(totalAmount) {
            document.getElementById("paypal-button-container").innerHTML = "";
            paypal.Buttons({
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: totalAmount } }] }),
                onApprove: (data, actions) => actions.order.capture().then(details => {
                    alert('Order successful!');
                    clearCart();
                })
            }).render('#paypal-button-container');
        }

        function confirmManualPay(method) {
            alert("Thanks! We'll process your order once we confirm the " + method + " payment.");
            clearCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function clearCart() {
            localStorage.removeItem("cart");
            loadCart();
        }

        handleIncomingItem();
        loadCart();
    </script>
</body>
</html>
