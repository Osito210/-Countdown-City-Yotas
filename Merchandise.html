
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="merchandise.css" rel="stylesheet">
    <title>Official Merchandise</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f4f4; }
        h1 { text-align: center; color: #333; }
        .merch-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .item-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item-card h2 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .price-list { list-style: none; padding: 0; }
        .price-list li { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .buy-btn { display: block; width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .buy-btn:hover { background: #218838; }
    </style>
</head>
<body>

    <h1>Merchandise Store</h1>
<div class="card-container">
  
  <div class="card">
    <h2>Stickers</h2>
    <ul>
      <li>5" Sticker - $5</li>
      <li>10" Sticker - $10</li>
      <li>24" Sticker - $25</li>
    </ul>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <h2>Shirts</h2>
    <p>Small - XL: $20</p>
    <p>2X and Up: $25</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <h2>Hoodies</h2>
    <p>Small - XL: $40</p>
    <p>2X and Up: $50</p>
    <button>Add to Cart</button>
  </div>

</div>


</body>
</html>
